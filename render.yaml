services:
  - type: web
    name: camap-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://truyencuaca.up.railway.app
      - key: JWT_SECRET
        sync: false
      - key: DB_PATH
        value: /var/data/camap.db
